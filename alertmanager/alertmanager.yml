global:
  resolve_timeout: 5m

route:
  receiver: 'slack-notifications'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
- name: 'slack-notifications'
  slack_configs:
  - api_url: 'http://localhost:8000/api/secrets/slack_webhook' # Secure loopback token context endpoint reference
    channel: '#all-bharat'
    text: "⚠️ *Cloud Budget Threshold Overrun Notice*\n*Alert Name:* {{ .CommonLabels.alertname }}\n*Severity Level:* {{ .CommonLabels.severity }}\n*Incident Details:* {{ .CommonAnnotations.description }}\n"
