global:
  resolve_timeout: 5m

route:
  receiver: 'dual-escalation-stack'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
- name: 'dual-escalation-stack'
  # 🟢 CHANNEL 1: Drops the live critical alert card straight into Slack
  slack_configs:
  - api_url: 'https://slack.com'
    channel: '#all-bharat'
    title: '⚠️ Cloud Budget Threshold Overrun Notice'
    text: 'Alert: DailyCostLimitExceeded | Severity: critical | The multi-cloud budget engine detected an anomaly. Burn rate has simulated an outlay over the allowed threshold.'
  
  # 🔵 CHANNEL 2: Routes the payload into your backend python container for WhatsApp processing
  webhook_configs:
  - url: 'http://backend:8000/api/v1/alerts/whatsapp'
